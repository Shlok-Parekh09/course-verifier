# Render Blueprint — Infrastructure-as-Code for course-verifier
# Docs: https://docs.render.com/blueprint-spec
services:
  - type: web
    name: course-verifier-dashboard
    runtime: python
    region: oregon              # change to singapore / frankfurt if closer to users
    plan: standard              # free → starter → standard; use standard for gunicorn workers
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT --workers 4 --threads 2 --timeout 120 wsgi:app
    healthCheckPath: /api/data
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FLASK_DEBUG
        value: "false"
      # Paste the entire contents of your serviceAccountKey.json into the
      # Render dashboard as an Environment Group or individual secret.
      # dashboard.py will create the file automatically if the env var exists.
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false