name: Cloud Course Verifier

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
    inputs:
      start_page:
        description: 'Start Page Number (Leave blank to resume from checkpoint)'
        required: false
        default: ''
      end_page:
        description: 'End Page Number (Leave blank for all remaining)'
        required: false
        default: ''

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CI: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Load All API Keys
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install System Dependencies (Chrome & Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev xvfb x11-utils
          # GitHub Actions Ubuntu-latest already has Google Chrome installed, 
          # but we need to ensure xvfb can run headlessly.

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt python-dotenv gdown

      - name: Download PDF from Google Drive
        run: |
          gdown "1UXA5HiTCRccVfbTvIz4aUEJqGb3M9rVd" -O link_compile.pdf

      - name: Run Verification (Virtual Display)
        # Using xvfb-run to simulate a real monitor for undetected_chromedriver
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          START_PAGE: ${{ github.event.inputs.start_page }}
          END_PAGE: ${{ github.event.inputs.end_page }}
        run: |
          xvfb-run --auto-servernum python autonomous_course_verifier.py

      - name: Commit and Push Results (Checkpoint Failsafe)
        if: always() # CRITICAL: This ensures your checkpoint saves even if the 6-hour limit is reached!
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add autonomous_verified_*.json || true
          git add master_dashboard_results.json || true
          git add CombinedWork.xlsx || true
          git add fees.xlsx || true
          git add rankings.db || true
          git commit -m "chore: save cloud verification progress" || echo "No changes to commit"
          git push

      - name: Upload Results as Zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results
          path: |
            autonomous_verified_*.json
            master_dashboard_results.json
            CombinedWork.xlsx
            fees.xlsx
            rankings.db
