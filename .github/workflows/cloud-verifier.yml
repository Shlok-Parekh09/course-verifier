name: Cloud Course Verifier

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
    inputs:
      start_page:
        description: "Start Page Number (Leave blank to resume from checkpoint)"
        required: false
        default: ""
      end_page:
        description: "End Page Number (Leave blank for all remaining)"
        required: false
        default: ""

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CI: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Load All API Keys
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install System Dependencies (Chrome & Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev xvfb x11-utils
          # Mount a tmpfs for /dev/shm to give Chrome enough shared memory (prevents tab crashes)
          sudo mount -t tmpfs -o size=2g tmpfs /dev/shm || true
          # Kill any stale Chrome processes that could interfere
          pkill -9 chrome 2>/dev/null || true
          # Verify Chrome is available
          google-chrome --version || true

      - name: Increase Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Install Python Dependencies
        run: |
          pip install -r requirements-verifier.txt python-dotenv gdown

      - name: Download PDF from Google Drive
        run: |
          gdown "1UXA5HiTCRccVfbTvIz4aUEJqGb3M9rVd" -O link_compile.pdf

      - name: Run Verification (Virtual Display)
        # xvfb-run provides a virtual display; --server-args sets screen depth/size
        # The code auto-detects CI=true and uses 3 browsers + headless=new mode
        # VERIFIER_NO_FORCE_EXIT prevents the script from calling sys.exit() so
        # the workflow continues even if a sub-step fails (checkpoint is saved).
        env:
          START_PAGE: ${{ github.event.inputs.start_page }}
          END_PAGE: ${{ github.event.inputs.end_page }}
          PDF_NAME: autonomous_verified_report
          DISPLAY: ":99"
          CI: true
          VERIFIER_NO_FORCE_EXIT: true
          # ── Ollama is the ONLY LLM backend (see llm_manager.py) ──
          # The OLLAMA_* keys come from the ENV_FILE secret written to .env in
          # the "Load All API Keys" step above, then read via load_dotenv().
          # llm_manager self-verifies the key on startup (sys.exit(1) on a
          # bad/missing key), so a bad ENV_FILE fails the job fast.
          # Ollama cloud queues requests over the plan concurrency (Pro=3).
          # Match browsers to the LLM cap so no browser sits idle waiting on a
          # slot. Pro → 3; Max → 10; Free → 1.
          VERIFIER_NUM_BROWSERS: 3
          OLLAMA_MAX_CONCURRENCY: 3
        run: |
          # Belt-and-braces: confirm the Ollama key made it into .env before the
          # (possibly long) run starts. llm_manager does the real auth check.
          if ! grep -qE '^OLLAMA_API_KEY=.' .env; then
            echo "::error::OLLAMA_API_KEY missing in .env (check the ENV_FILE secret). The verifier runs on Ollama cloud only."
            exit 1
          fi
          Xvfb :99 -screen 0 1280x1024x24 -ac +extension RANDR +extension GLX +render -noreset &
          sleep 3
          # Run with continue-on-error so checkpoint is always saved
          python autonomous_course_verifier.py || echo "::warning::Verifier exited with non-zero status, but checkpoint should be saved"

      - name: Remove input PDF before upload
        if: always()
        run: |
          rm -f link_compile.pdf

      - name: Upload Results as Zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-results
          path: |
            *.pdf
            autonomous_verified_*.json

      - name: Upload Affiliation DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: affiliation-db
          path: affiliation_db.json
