name: Autonomous Course Verifier

on:
  workflow_dispatch:
    inputs:
      pdf:
        description: 'PDF filename in repo to verify (basename only, e.g. link_compile_trimmed.pdf or 421-499.pdf)'
        required: true
        default: '688-965_compressed.pdf'
      start_page:
        description: 'Start PDF page (original page numbering). Blank = resume from checkpoint.'
        required: false
        default: ''
      end_page:
        description: 'End PDF page (original page numbering). Blank = all remaining.'
        required: false
        default: ''
      browsers:
        description: 'Number of parallel browsers (match to Ollama plan: Pro=3, Max=10, Free=1)'
        required: false
        default: '3'
      llm_text_budget:
        description: 'Max chars of page text sent to the LLM (default 400000; retry uses 40000)'
        required: false
        default: '400000'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Increase Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-liberation libglib2.0-0t64 libnss3 \
            libfontconfig1 libxss1 libatk-bridge2.0-0t64 \
            libgtk-3-0t64 libxcomposite1 libxcursor1 libxdamage1 libxi6 libxtst6 \
            libxrandr2 libasound2t64 libpangocairo-1.0-0 libatspi2.0-0t64 libcups2t64 \
            libdrm2 libgbm1 libxkbcommon0 tesseract-ocr tesseract-ocr-eng \
            unzip curl xvfb x11-utils

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements-verifier.txt') }}

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements-verifier.txt python-dotenv

      - name: Load All API Keys
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env

      - name: Run verifier
        id: verifier
        env:
          CI: true
          VERIFIER_NO_FORCE_EXIT: true
          VERIFIER_NUM_BROWSERS: ${{ inputs.browsers }}
          OLLAMA_MAX_CONCURRENCY: ${{ inputs.browsers }}
          VERIFIER_LLM_TEXT_BUDGET: ${{ inputs.llm_text_budget }}
          # The verifier reads these in CI mode to scope the page range
          START_PAGE: ${{ inputs.start_page }}
          END_PAGE: ${{ inputs.end_page }}
          # Predictable report filename for the artifact upload
          PDF_NAME: ${{ inputs.pdf }}
          # ── Ollama is the ONLY LLM backend (see llm_manager.py) ──
          # OLLAMA_* keys come from the ENV_FILE secret written to .env above,
          # then read via load_dotenv(). llm_manager self-verifies the key on
          # startup (sys.exit(1) on a bad/missing key).
          DISPLAY: ":99"
        run: |
          if ! grep -qE '^OLLAMA_API_KEY=.' .env; then
            echo "::error::OLLAMA_API_KEY missing in .env (check the ENV_FILE secret). The verifier runs on Ollama cloud only."
            exit 1
          fi
          Xvfb :99 -screen 0 1280x1024x24 -ac +extension RANDR +extension GLX +render -noreset &
          sleep 3
          python autonomous_course_verifier.py "${{ inputs.pdf }}" || echo "::warning::Verifier exited with non-zero status, but checkpoint should be saved"

      - name: Upload PDF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: |
            *.pdf
            autonomous_verified_*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: verification_screenshots/**
          retention-days: 14
          if-no-files-found: warn

      - name: Send email notification
        if: always()
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python3 .github/scripts/send_email.py