name: Course Verify

  on:
    workflow_dispatch:
      inputs:
        start_page:
          description: Start page
          required: true
          default: '602'
        end_page:
          description: End page
          required: true
          default: '1890'
        browsers:
          description: Number of parallel browsers
          required: true
          default: '2'
        resume:
          description: Resume from checkpoint
          type: boolean
          required: false
          default: false

  jobs:
    verify:
      runs-on: ubuntu-latest
      timeout-minutes: 360
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install system deps
          run: |
            sudo apt-get update
            sudo apt-get install -y wget gnupg2 ca-certificates fonts-liberation libglib2.0-0 libnss3
  libgconf-2-4 libfontconfig1 libxss1 libappindicator3-1 libatk-bridge2.0-0 libgtk-3-0 libxcomposite1
  libxcursor1 libxdamage1 libxi6 libxtst6 libxrandr2 libasound2 libpangocairo-1.0-0 libatspi2.0-0 libcups2
  libdrm2 libgbm1 libxkbcommon0 tesseract-ocr tesseract-ocr-eng unzip curl

        - name: Install Chrome
          run: |
            wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >
  /etc/apt/sources.list.d/google.list'
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable

        - name: Cache pip
          uses: actions/cache@v4
          with:
            path: ~/.cache/pip
            key: pip-${{ hashFiles('requirements.txt') }}

        - name: Install pip deps
          run: |
            pip install --upgrade pip
            pip install -r requirements.txt
            playwright install chromium || true

        - name: Restore checkpoint
          if: inputs.resume
          uses: actions/download-artifact@v4
          with:
            name: verifier-checkpoint
          continue-on-error: true

        - name: Run verifier
          env:
            VERIFIER_NO_FORCE_EXIT: true
            OPENROUTER_KEY_1: ${{ secrets.OPENROUTER_KEY_1 }}
            GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
            OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
            OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
            OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          run: |
            BROWSERS="${{ inputs.browsers }}"
            sed -i "s/NUM_BROWSERS = 6/NUM_BROWSERS = ${BROWSERS}/g" autonomous_course_verifier.py
            python run_verifier_pages.py link_compile.pdf --pages ${{ inputs.start_page }} ${{
  inputs.end_page }} --no-email

        - name: Upload PDF
          uses: actions/upload-artifact@v4
          with:
            name: report-pdf
            path: Verification_Report_Pages_*.pdf

        - name: Upload checkpoint
          uses: actions/upload-artifact@v4
          with:
            name: verifier-checkpoint
            path: autonomous_verified_link_compile.pdf.json

        - name: Upload Excel
          uses: actions/upload-artifact@v4
          with:
            name: report-excel
            path: '*.xlsx'

        - name: Upload screenshots
          uses: actions/upload-artifact@v4
          with:
            name: screenshots
            path: verification_screenshots/**

        - name: Send email
          if: always()
          env:
            SMTP_HOST: ${{ secrets.SMTP_HOST }}
            SMTP_PORT: ${{ secrets.SMTP_PORT }}
            SMTP_USER: ${{ secrets.SMTP_USER }}
            SMTP_PASS: ${{ secrets.SMTP_PASS }}
            SMTP_FROM: ${{ secrets.SMTP_FROM }}
            SMTP_TO: ${{ secrets.SMTP_TO }}
          run: python3 .github/scripts/send_email.py
