name: Course Verify

on:
  workflow_dispatch:
    inputs:
      start_page:
        description: 'Start PDF page (original page numbering)'
        required: true
        default: '172'
      end_page:
        description: 'End PDF page (original page numbering)'
        required: true
        default: '172'
      page_offset:
        description: 'Original page = cropped page + offset (171 if PDF starts at original p.172)'
        required: false
        default: '171'
      browsers:
        description: 'Number of parallel browsers'
        required: true
        default: '2'
      http_first:
        description: 'Enable HTTP-first extraction (skip browser for static pages) - 1/0'
        required: false
        default: '1'
      llm_text_budget:
        description: 'Max chars of page text sent to the LLM (default 25000)'
        required: false
        default: '25000'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-liberation libglib2.0-0t64 libnss3 \
            libfontconfig1 libxss1 libatk-bridge2.0-0t64 \
            libgtk-3-0t64 libxcomposite1 libxcursor1 libxdamage1 libxi6 libxtst6 \
            libxrandr2 libasound2t64 libpangocairo-1.0-0 libatspi2.0-0t64 libcups2t64 \
            libdrm2 libgbm1 libxkbcommon0 tesseract-ocr tesseract-ocr-eng \
            unzip curl

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium || true

      - name: Run verifier
        id: verifier
        env:
          VERIFIER_NO_FORCE_EXIT: true
          VERIFIER_HTTP_FIRST: ${{ inputs.http_first }}
          VERIFIER_LLM_TEXT_BUDGET: ${{ inputs.llm_text_budget }}
          OPENROUTER_KEY_1: ${{ secrets.OPENROUTER_KEY_1 }}
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          OLLAMA_API_URL: ${{ secrets.OLLAMA_API_URL }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          BROWSERS="${{ inputs.browsers }}"
          sed -i "s/NUM_BROWSERS = 6/NUM_BROWSERS = ${BROWSERS}/g" autonomous_course_verifier.py
          python run_verifier_pages.py link_compile_trimmed.pdf --pages ${{ inputs.start_page }} ${{ inputs.end_page }} --fresh --page-offset ${{ inputs.page_offset }} --no-email

      - name: Upload PDF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: Verification_Report_Pages_*.pdf
          retention-days: 30
          if-no-files-found: error

      - name: Upload checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verifier-checkpoint
          path: autonomous_verified_link_compile_trimmed.pdf.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: verification_screenshots/**
          retention-days: 14
          if-no-files-found: warn

      - name: Send email notification
        if: always()
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python3 .github/scripts/send_email.py
