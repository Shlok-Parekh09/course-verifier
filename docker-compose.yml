version: "3.9"

services:
  verifier:
    build: .
    container_name: course-verifier
    volumes:
      - ./:/app
      - ./verification_screenshots:/app/verification_screenshots
    ports:
      - "8080:8080"
    environment:
      - VERIFIER_NO_FORCE_EXIT=true
      - SEND_EMAIL_ON_COMPLETE=${SEND_EMAIL_ON_COMPLETE:-true}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_TO=${SMTP_TO:-yugshah197@gmail.com}
    env_file:
      - .env
    # Override CMD if you want dashboard-only mode:
    # command: python dashboard.py
    command: >
      python run_verifier_pages.py link_compile.pdf --pages 602 1890
    restart: unless-stopped
